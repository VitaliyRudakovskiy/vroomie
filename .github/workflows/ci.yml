name: Vroomie CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome Check (Lint & Format TS/JS/JSON)
        run: pnpm run check

      - name: Prettier Check (HTML)
        run: pnpm exec prettier --check "src/**/*.html"

      - name: Build
        run: pnpm run build
