name: Vroomie CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome Check (Lint & Format TS/JS/JSON)
        run: bun run check

      - name: Prettier Check (HTML)
        run: bunx prettier --check "src/**/*.html"

      - name: Build
        run: bun run build
