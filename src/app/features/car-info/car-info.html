<section class="car-info-section">
	<div class="main-content">
		<div class="main-content__header">
			<h2>Car info</h2>
		</div>

		<div class="main-content__container">
			@if (loading()) {
				<app-loader
					description="Loading car info..."
					[spinnerSize]="64"
					[spinnerThikness]="7"
					[withBlur]="false"
				/>
			} @else {
				<p>Загружено {{ carInfo()?.make }}</p>
			}
		</div>
	</div>
</section>
