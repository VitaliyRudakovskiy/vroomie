<section class="car-info-section">
	<div class="main-content">
		<div class="main-content__header">
			<app-button [label]="'< Back'" variant="secondary" size="sm" (clicked)="goBack()" />
			<h2>Car info</h2>
		</div>

		<div class="main-content__container">
			@if (loading()) {
				<app-loader
					description="Loading car info..."
					[spinnerSize]="64"
					[spinnerThikness]="7"
					[withBlur]="false"
				/>
			} @else if (carInfo()) {
				<app-general-info [carInfo]="carInfo()!" />
			}
		</div>
	</div>
</section>
