<section class="global-page-section">
	<div class="global-main-content">
		<div class="global-main-content__header">
			<app-button label="&lt; Back" variant="secondary" size="sm" (clicked)="goBack()" />
			<h2>Car info</h2>
		</div>

		<div class="global-main-content__container">
			@if (loading()) {
				<app-loader
					description="Loading car info..."
					[spinnerSize]="64"
					[spinnerThikness]="7"
					[withBlur]="false"
				/>
			} @else if (carInfo()) {
				<div class="full-page-content">
					<app-general-info [carInfo]="carInfo()!" />
				</div>
			}
		</div>

		<div class="buttons">
			<app-button label="Plans" fullWidth (clicked)="goToPlans()" />
			<app-button label="Services" fullWidth (clicked)="goToServices()" />
		</div>
	</div>
</section>
