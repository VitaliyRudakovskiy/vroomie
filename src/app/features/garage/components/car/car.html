@let carInfo = car();

<app-card padding="12px" isInteractive (clicked)="clickCard()">
	<div class="card-content">
		<div class="card-content__info">
			<p class="brand">{{ carInfo.make }} {{ carInfo.model }}</p>
			<p class="odometer">{{ carInfo.currentOdometer }} km</p>
			@if (carInfo.vin) {
				<p class="vin">VIN: {{ carInfo.vin }}</p>
			}
		</div>
	</div>
</app-card>
