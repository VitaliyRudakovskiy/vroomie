<section class="garage-section">
	<div class="main-content">
		<h2 class="main-content__title">My cars</h2>
		<app-card padding="12px 16px">
			<div class="card-content">
				<img class="card-content__image" src="assets/images/test.jpg" alt="asdasdasd" />
				<div class="card-content__info">
					<p>Peugeot 307 (2006) - хэтчбэк</p>
				</div>
			</div>
		</app-card>
	</div>
	<app-button class="add-car-button" label="+ Add car" (clicked)="showCarModal()" />
</section>

<app-car-modal
	modalTitle="Adding a car"
	[visible]="isCarModalOpen()"
	(closeModal)="closeCarModal()"
/>
