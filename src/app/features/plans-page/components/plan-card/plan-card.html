@let pl = plan();

<app-card padding="12px" isInteractive (clicked)="clickCard()">
	<div class="card-content">
		<p class="title">{{ pl.title }}</p>
		<p class="notes">{{ pl.notes }}</p>
		<div class="priority" [class]="priority().class">{{ priority().label }}</div>

		<app-cross-button
			hoverText="Delete plan"
			top="0"
			right="0"
			(clicked)="openConfirmDeleteModal($event)"
		/>
	</div>
</app-card>

<app-confirm-modal
	modalTitle="Delete plan"
	[description]="['Are you sure you want to delete plan?', pl.title]"
	[loading]="deleteLoading()"
	[visible]="isDeleteModalOpen()"
	(cancelEvent)="closeConfirmDeleteModal()"
	(confirm)="deleteCard()"
/>
