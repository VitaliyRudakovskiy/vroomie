<section class="global-page-section">
	<div class="global-main-content">
		<div class="global-main-content__header">
			<app-button label="&lt; Back" variant="secondary" size="sm" (clicked)="goBack()" />
			<div class="global-main-content__header__right">
				<h2>Plans</h2>
				<app-profile-button />
			</div>
		</div>

		<div class="global-main-content__container">
			@if (loading()) {
				<app-loader
					description="Loading plans..."
					[spinnerSize]="64"
					[spinnerThikness]="7"
					[withBlur]="false"
				/>
			} @else {
				@let car = carInfo();
				<h3>{{ car?.make }} {{ car?.model }}</h3>

				@for (plan of plans(); track plan.id) {
					<app-plan-card [plan]="plan" />
				} @empty {
					<span>It's time to add some plans</span>
				}
			}
		</div>
		<div class="buttons">
			<app-button label="+ Add Plan" (clicked)="openPlanModal()" />
		</div>
	</div>
</section>

<app-plan-modal
	[carId]="carId()"
	[carInfo]="carInfo()!"
	[visible]="isPlanModalOpen()"
	(closeModal)="closePlanModal()"
/>
