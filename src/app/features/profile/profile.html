@let user = currentUser();

<section class="global-page-section">
	<div class="global-main-content">
		<div class="global-main-content__header">
			<app-button label="&lt; Back" variant="secondary" size="sm" (clicked)="goBack()" />
			<h2>My profile</h2>
		</div>

		<div class="global-main-content__container">
			<app-qr-code class="qr-code" />

			<div class="centered-container">
				<app-avatar
					#avatarComponent
					[loading]="photoLoading()"
					[userAvatar]="userAvatarDetails()"
					(fileSelected)="onFileSelectedFromChild($event)"
				/>

				<p class="username">{{ user?.displayName }}</p>
				<p>{{ user?.email }}</p>
			</div>

			<div class="buttons">
				<app-button
					label="Change photo"
					iconBefore="profile/camera.svg"
					direction="column"
					size="profile-custom"
					(clicked)="onChangePhoto()"
				/>
				<app-button
					label="Edit name"
					iconBefore="profile/edit.svg"
					direction="column"
					size="profile-custom"
					(clicked)="openChangeNameModal()"
				/>
				<app-button
					label="Settings"
					iconBefore="profile/settings.svg"
					direction="column"
					size="profile-custom"
					(clicked)="goToSettings()"
				/>
			</div>

			<app-friends [friends]="friends()" />
		</div>
	</div>
</section>

<app-confirm-modal
	modalTitle="Change avatar"
	description="Your current profile picture will be removed. Continue?"
	[visible]="isConfirmModalOpen()"
	[loading]="deleteLoading()"
	(confirm)="removeAvatar()"
	(cancelEvent)="onCloseConfirmModal()"
/>

<app-change-name-modal
	[visible]="isChangeNameModalOpen()"
	[initialName]="user?.displayName ?? ''"
	(closeModal)="closeChangeNameModal()"
/>
