@let service = serviceInfo();

<app-card padding="12px" isInteractive (clicked)="clickCard()">
	<div class="card-content">
		<h4 class="title">{{ service.title }}</h4>
		<p class="odometer">{{ service.odometer }} km</p>
		<p class="notes">{{ service.notes }}</p>
		<span class="date">
			{{ convertDate(service.date) | date: 'EEE dd.MM.yyyy' : '' : 'ru-RU' }}
		</span>
		<button
			type="button"
			class="delete-button"
			aria-label="Delete modal"
			(click)="openConfirmDeleteModal()"
		>
			✕
		</button>
	</div>
</app-card>

<app-confirm-modal
	modalTitle="Delete service"
	[description]="['Are you sure you want to delete service?', service.title]"
	[loading]="deleteLoading()"
	[visible]="isConfirmModalOpen()"
	(cancelEvent)="closeConfirmDeleteModal()"
	(confirm)="deleteCard()"
/>
