@let service = serviceInfo();

<app-card padding="12px" isInteractive (clicked)="clickCard()">
	<div class="card-content">
		<h4 class="title">{{ service.title }}</h4>
		<p class="odometer">{{ service.odometer }} km</p>
		<p class="notes">{{ service.notes }}</p>
		<span class="date">
			{{ convertDate(service.date) | date: 'EEE dd.MM.yyyy' : '' : 'ru-RU' }}
		</span>
	</div>
</app-card>
