<section class="global-page-section">
	<div class="global-main-content">
		<div class="global-main-content__header">
			<app-button label="&lt; Back" variant="secondary" size="sm" (clicked)="goBack()" />
			<div class="global-main-content__header__right">
				<h2>Settings</h2>
				<app-profile-button />
			</div>
		</div>

		<div class="global-main-content__container">
			<p>User: {{ currentUser()?.displayName }} ({{ currentUser()?.email }})</p>
		</div>

		<app-button label="Logout" (clicked)="logout()" />
		<app-button label="Delete account" variant="danger" (clicked)="openDeleteAccountModal()" />
	</div>
</section>

<app-confirm-modal
	modalTitle="Delete account"
	[description]="[
		'Are you sure you want to delete account?',
		'This will permanently delete all your cars, services and plans.',
		`This action can't be undone.`,
	]"
	[visible]="isDeleteAccountModalOpen()"
	[loading]="deleteLoading()"
	(cancelEvent)="closeDeleteAccountModal()"
	(confirm)="deleteAccount()"
/>
