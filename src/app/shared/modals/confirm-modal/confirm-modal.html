<app-modal-wrapper [visible]="visible()" [modalTitle]="modalTitle()" (closeModal)="onClose()">
	<div class="description">
		@if (isDescriptionArray()) {
			@for (line of description(); track line; let first = $first) {
				<p [style.margin-bottom.px]="first ? 12 : 0">
					{{ line }}
				</p>
			}
		} @else {
			<p>{{ description() }}</p>
		}
	</div>

	<div class="global-form-buttons-end">
		<app-button variant="secondary" [label]="cancelLabel()" (clicked)="onClose()" />
		<app-button
			variant="danger"
			[label]="confirmLabel()"
			[loading]="loading()"
			(clicked)="onApply()"
		/>
	</div>
</app-modal-wrapper>
