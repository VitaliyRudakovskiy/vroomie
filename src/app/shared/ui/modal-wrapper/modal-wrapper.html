<div class="modal-overlay" [class.is-visible]="visible()">
	<div class="modal-content" role="modal" aria-modal="true" [style.padding.px]="innerPadding()">
		<h3>{{ modalTitle() }}</h3>
		<app-cross-button hoverText="Close modal" top="16px" right="16px" (clicked)="onClose($event)" />
		<ng-content></ng-content>
	</div>
</div>
