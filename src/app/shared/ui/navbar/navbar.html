<aside class="navbar">
	@for (element of navbarElements; track element.label) {
		<a
			class="navbar-item"
			routerLinkActive="active"
			[title]="element.label"
			[routerLink]="[element.label]"
		>
			<img
				class="navbar-item__image"
				[src]="element.icon"
				[alt]="`Navbar icon for ${element.label}`"
			/>
		</a>
	}
</aside>
